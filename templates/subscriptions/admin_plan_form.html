{% extends "base.html" %}
{% block content %}
<div class="container py-5 main-content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg" style="background-color: var(--card-bg); color: white;">
                <div class="card-header bg-transparent border-0 pt-4 px-4">
                    <h3 class="fw-bold">{% if form.instance.pk %}Editar{% else %}Nuevo{% endif %} Plan</h3>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label text-secondary small">{{ field.label }}</label>
                            {{ field }} <!-- Nota: Agrega clases de Bootstrap vía widgets en forms.py si es necesario -->
                            <style>
                                input, select { 
                                    background-color: #2a2a2a !important; 
                                    border: 1px solid #3d3d3d !important; 
                                    color: white !important;
                                    padding: 10px; border-radius: 8px; width: 100%;
                                }
                                input:focus { border-color: var(--primary-color) !important; outline: none; }
                            </style>
                        </div>
                        {% endfor %}
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-navy w-100 py-2">Guardar Cambios</button>
                            <a href="{% url 'subscriptions:plan_list' %}" class="btn btn-outline-secondary w-100">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

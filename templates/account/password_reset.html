{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Recuperar Contraseña - GymPro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 bg-dark shadow">
            <div class="card-body p-5 text-center">
                <h2 class="fw-bold" style="color: #003366;">¿Olvidaste tu clave?</h2>
                <p class="text-secondary mb-4">Ingresa tu correo y te enviaremos instrucciones.</p>

                <form method="post" action="{% url 'account_reset_password' %}" class="text-start">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-lg text-white" style="background-color: #003366;">Enviar Correo</button>
                    </div>
                </form>
                
                <a href="{% url 'account_login' %}" class="btn btn-link text-secondary mt-3 text-decoration-none small">Volver al login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
